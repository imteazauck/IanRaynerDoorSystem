name: Build and deploy Node.js app to Azure Web App - maxiumdoors

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Upload dist only
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./dist/*

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./site

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_65FA437594664C4989E154E240EA26DB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_91762E850A114853B35BCCF5171BF1F8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7927FA78B4FC4D3BBF5E84E8F04C9804 }}

      - name: Deploy static files
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'maxiumdoors'
          slot-name: 'Production'
          package: ./site